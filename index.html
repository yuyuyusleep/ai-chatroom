<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天室 · CatDesk & OpenClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
    .online-badge {
      font-size: 12px; color: #6ee7b7;
      background: #064e3b33;
      border: 1px solid #065f4633;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .members {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .av-user   { background: #7c3aed; color: #fff; }
    .av-cat    { background: #0ea5e9; color: #fff; }
    .av-claw   { background: #f59e0b; color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.self { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body { max-width: 70%; }
    .msg-meta { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .msg.self .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble-user   { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-cat    { background: #1e3a5f; color: #e0f2fe; border-bottom-left-radius: 4px; border: 1px solid #0ea5e933; }
    .bubble-claw   { background: #3b2000; color: #fef3c7; border-bottom-left-radius: 4px; border: 1px solid #f59e0b33; }
    .bubble-system { background: #1f2937; color: #9ca3af; font-size: 12px; border-radius: 8px; text-align: center; }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%; background: #6b7280;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 14px 20px;
    }
    .hint { font-size: 11px; color: #4b5563; margin-bottom: 8px; }
    .hint span { color: #7c3aed; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #msgInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: #7c3aed; }
    #msgInput::placeholder { color: #4b5563; }

    #sendBtn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #sendBtn:hover { background: #6d28d9; }
    #sendBtn:disabled { background: #374151; cursor: not-allowed; }

    #loginOverlay {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 40px;
      width: 340px;
      text-align: center;
    }
    .login-box h2 { font-size: 22px; color: #a78bfa; margin-bottom: 8px; }
    .login-box p  { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
    .login-box input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #6d28d9; }
    .robots { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .robot-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .robot-card .r-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      margin: 0 auto 6px;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2>🤖 AI 聊天室</h2>
    <p>和 CatDesk & OpenClaw 一起聊天</p>
    <div class="robots">
      <div class="robot-card">
        <div class="r-avatar" style="background:#1e3a5f;color:#0ea5e9">C</div>
        CatDesk
      </div>
      <div class="robot-card">
        <div class="r-avatar" style="background:#3b2000;color:#f59e0b">O</div>
        OpenClaw
      </div>
    </div>
    <input id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="20" />
    <button onclick="enterChat()">进入聊天室</button>
  </div>
</div>

<header>
  <h1>🤖 AI 聊天室</h1>
  <span class="online-badge">● 在线</span>
  <div class="members">
    <div class="avatar av-cat" title="CatDesk">C</div>
    <div class="avatar av-claw" title="OpenClaw">O</div>
    <div class="avatar av-user" id="userAvatar" title="你">?</div>
  </div>
</header>

<div id="messages"></div>

<div class="input-area">
  <div class="hint">输入 <span>@CatDesk</span> 或 <span>@OpenClaw</span> 呼叫指定 AI，或直接发消息让两个 AI 都回复</div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="说点什么..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const CATDESK_SYSTEM = `你是 CatDesk，美团质量与效率团队打造的 AI 助手。你聪明、专业、有条理，擅长解决技术问题和工作任务。
你在一个三人聊天室里，另一个 AI 是 OpenClaw，用户也在。
回复要简洁有力，不超过200字。遇到技术问题给出具体方案。`;

const OPENCLAW_SYSTEM = `你是 OpenClaw，一个开放、创意、思维发散的 AI 助手。你喜欢从不同角度思考问题，有时会提出意想不到的解决方案。
你在一个三人聊天室里，另一个 AI 是 CatDesk，用户也在。
回复要有个性，偶尔幽默，不超过200字。`;

let myName = '';
let chatHistory = [];
let isAiTyping = false;

function enterChat() {
  if (myName) return;
  const name = document.getElementById('nicknameInput').value.trim();
  if (!name) { alert('请输入昵称'); return; }
  myName = name;
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  document.getElementById('loginOverlay').style.display = 'none';
  addSystemMsg(name + ' 进入了聊天室');
  setTimeout(() => {
    addAiMsg('CatDesk', '👋 你好 ' + name + '！我是 CatDesk，有什么我可以帮你的？也可以 @OpenClaw 让我们一起讨论。');
  }, 600);
}

document.getElementById('nicknameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') enterChat();
});

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isAiTyping) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMsg(myName, text);
  chatHistory.push({ role: 'user', content: myName + ': ' + text });

  const mentionCat  = /@CatDesk/i.test(text);
  const mentionClaw = /@OpenClaw/i.test(text);
  const mentionBoth = !mentionCat && !mentionClaw;

  isAiTyping = true;
  document.getElementById('sendBtn').disabled = true;

  if (mentionCat || mentionBoth)  await replyAs('CatDesk',  CATDESK_SYSTEM,  text);
  if (mentionClaw || mentionBoth) await replyAs('OpenClaw', OPENCLAW_SYSTEM, text);

  isAiTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

const DEEPSEEK_API_KEY = 'sk-8f5ba8d190a148fea59e34e9aff010a7';
const OPENCLAW_BASE = 'https://favourite-maintain-hansen-solutions.trycloudflare.com';
const OPENCLAW_TOKEN = 'chatroom-openclaw-2026';

async function replyAs(botName, systemPrompt, userText) {
  const typingId = addTypingIndicator(botName);
  const messages = [
    { role: 'system', content: systemPrompt },
    ...chatHistory.slice(-10).map(function(m) { return { role: m.role, content: m.content }; }),
  ];

  try {
    let res, data, reply;

    if (botName === 'OpenClaw') {
      // 直接调用 OpenClaw API
      res = await fetch(OPENCLAW_BASE + '/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENCLAW_TOKEN },
        body: JSON.stringify({ model: 'openclaw', messages: messages, max_tokens: 400, temperature: 0.8 }),
      });
    } else {
      // 直接调用 DeepSeek API
      res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({ model: 'deepseek-chat', messages: messages, max_tokens: 400, temperature: 0.7 }),
      });
    }

    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg(botName, '⚠️ 错误 ' + res.status + '：' + errText.substring(0, 200));
      return;
    }
    data = await res.json();
    reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      ? data.choices[0].message.content.trim()
      : '（AI 暂时无法回复）';
    addAiMsg(botName, reply);
    chatHistory.push({ role: 'assistant', content: botName + ': ' + reply });
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg(botName, '⚠️ 连接出错：' + e.message);
  }
}

function addUserMsg(name, text) {
  const el = document.createElement('div');
  el.className = 'msg self';
  el.innerHTML =
    '<div class="msg-avatar av-user">' + name[0].toUpperCase() + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + name + ' · ' + now() + '</div>' +
      '<div class="msg-bubble bubble-user">' + escHtml(text) + '</div>' +
    '</div>';
  appendMsg(el);
}

function addAiMsg(botName, text) {
  const isCat = botName === 'CatDesk';
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML =
    '<div class="msg-avatar ' + (isCat ? 'av-cat' : 'av-claw') + '">' + botName[0] + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' · ' + now() + '</div>' +
      '<div class="msg-bubble ' + (isCat ? 'bubble-cat' : 'bubble-claw') + '">' + escHtml(text) + '</div>' +
    '</div>';
  appendMsg(el);
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = '<div class="msg-bubble bubble-system" style="margin:0 auto">' + escHtml(text) + '</div>';
  appendMsg(el);
}

function addTypingIndicator(botName) {
  const isCat = botName === 'CatDesk';
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg';
  el.id = id;
  el.innerHTML =
    '<div class="msg-avatar ' + (isCat ? 'av-cat' : 'av-claw') + '">' + botName[0] + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' 正在输入...</div>' +
      '<div class="msg-bubble ' + (isCat ? 'bubble-cat' : 'bubble-claw') + '">' +
        '<div class="typing-indicator"><span></span><span></span><span></span></div>' +
      '</div>' +
    '</div>';
  appendMsg(el);
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendMsg(el) {
  const c = document.getElementById('messages');
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
