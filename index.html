<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天室 · 不象话 &amp; 净瞎说</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
    .online-badge {
      font-size: 12px; color: #6ee7b7;
      background: #064e3b33;
      border: 1px solid #065f4633;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .members {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .av-user   { background: #7c3aed; color: #fff; }
    .av-cat    { background: #0ea5e9; color: #fff; }
    .av-claw   { background: #f59e0b; color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.self { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body { max-width: 70%; }
    .msg-meta { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .msg.self .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble-user   { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-cat    { background: #1e3a5f; color: #e0f2fe; border-bottom-left-radius: 4px; border: 1px solid #0ea5e933; }
    .bubble-claw   { background: #3b2000; color: #fef3c7; border-bottom-left-radius: 4px; border: 1px solid #f59e0b33; }
    .bubble-system { background: #1f2937; color: #9ca3af; font-size: 12px; border-radius: 8px; text-align: center; }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%; background: #6b7280;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 14px 20px;
    }
    .hint { font-size: 11px; color: #4b5563; margin-bottom: 8px; }
    .hint span { color: #7c3aed; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #msgInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: #7c3aed; }
    #msgInput::placeholder { color: #4b5563; }

    #sendBtn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #sendBtn:hover { background: #6d28d9; }
    #sendBtn:disabled { background: #374151; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: #4b5563;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #clearBtn:hover { color: #ef4444; border-color: #ef4444; }

    #imgBtn {
      background: transparent;
      color: #6b7280;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      line-height: 1;
    }
    #imgBtn:hover { color: #a78bfa; border-color: #7c3aed; }

    #imgPreview {
      display: none;
      padding: 8px 0 4px;
      position: relative;
      width: fit-content;
    }
    #imgPreview img {
      max-height: 80px;
      max-width: 200px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
    }
    #imgPreview .remove-img {
      position: absolute;
      top: 4px;
      right: -8px;
      background: #374151;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .msg-img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
      border: 1px solid #2a2a4a;
    }

    #loginOverlay {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 40px;
      width: 340px;
      text-align: center;
    }
    .login-box h2 { font-size: 22px; color: #a78bfa; margin-bottom: 8px; }
    .login-box p  { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
    .login-box input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #6d28d9; }
    .robots { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .robot-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .robot-card .r-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      margin: 0 auto 6px;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2>🤖 AI 聊天室</h2>
    <p>和 不象话 &amp; 净瞎说 一起聊天</p>
    <div class="robots">
      <div class="robot-card">
        <div class="r-avatar" style="background:#1e3a5f;color:#0ea5e9">不</div>
        不象话
      </div>
      <div class="robot-card">
        <div class="r-avatar" style="background:#3b2000;color:#f59e0b">净</div>
        净瞎说
      </div>
    </div>
    <input id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="20" />
    <button onclick="enterChat()">进入聊天室</button>
  </div>
</div>

<header>
  <h1>🤖 AI 聊天室</h1>
  <span class="online-badge">● 在线</span>
  <div class="members">
    <div class="avatar av-cat" title="不象话">不</div>
    <div class="avatar av-claw" title="净瞎说">净</div>
    <div class="avatar av-user" id="userAvatar" title="你">?</div>
  </div>
</header>

<div id="messages"></div>

<div class="input-area">
  <div class="hint">输入 <span>@不象话</span> 或 <span>@净瞎说</span> 呼叫指定 AI，或直接发消息让两个 AI 都回复</div>
  <div id="imgPreview">
    <img id="imgPreviewImg" src="" alt="预览" />
    <button class="remove-img" onclick="removeImage()">×</button>
  </div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="说点什么..." rows="1"></textarea>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)" />
    <button id="imgBtn" onclick="document.getElementById('imgInput').click()" title="发送图片">🖼</button>
    <button id="clearBtn" onclick="clearMemory()" title="清除聊天记忆">🗑 清除记忆</button>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const CATDESK_SYSTEM = `你是不象话，一个说话直接、不按套路出牌的 AI。你聪明专业，但从不废话，说出来的话让人觉得"这也太不象话了"——但偏偏有道理。

你在一个三人聊天室里：用户负责抛出问题和最终拍板，你和净瞎说负责讨论、碰撞、给出方案。

你的行为准则：
- 用户发问时，你先给出具体方案或判断，简洁有力
- 如果上下文里有净瞎说的发言，你要直接回应它——认同、反驳、或补充都行，但要有态度
- 你们两个讨论的目的是帮用户做出更好的决策，不是为了吵架
- 回复不超过150字，不废话，直接说核心
- 如果用户发了图片，直接分析图片内容`;

const OPENCLAW_SYSTEM = `你是净瞎说，一个爱质疑、爱抬杠的 AI。你天生喜欢从反面思考，说出来的话让人觉得"你在净瞎说吧"——但细想又有道理。

你在一个三人聊天室里：用户负责抛出问题和最终拍板，你和不象话负责讨论、碰撞、给出方案。

你的行为准则：
- 如果上下文里有不象话的发言，你要直接回应它——质疑它的方案、指出盲点、或提出完全不同的思路
- 不要只回应用户，要和不象话真正交锋
- 你们两个讨论的目的是帮用户做出更好的决策
- 回复不超过150字，毒舌但有深度，不要客套
- 如果用户发了图片，从批判角度分析`;

let myName = '';
let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
let isAiTyping = false;
let pendingImageBase64 = null;
let pendingImageMime = null;

function saveMemory() {
  // 保存时过滤掉图片数据（太大），只保留文字历史
  const textOnly = chatHistory.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content : (m.content.find(c => c.type === 'text') || {text:''}).text
  }));
  localStorage.setItem('chatHistory', JSON.stringify(textOnly.slice(-40)));
}

function clearMemory() {
  if (!confirm('确定清除所有聊天记忆吗？')) return;
  chatHistory = [];
  localStorage.removeItem('chatHistory');
  document.getElementById('messages').innerHTML = '';
  addSystemMsg('记忆已清除，重新开始');
}

function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    pendingImageMime = file.type || 'image/jpeg';
    pendingImageBase64 = dataUrl.split(',')[1];
    document.getElementById('imgPreviewImg').src = dataUrl;
    document.getElementById('imgPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeImage() {
  pendingImageBase64 = null;
  pendingImageMime = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPreviewImg').src = '';
}

function enterChat() {
  if (myName) return;
  const name = document.getElementById('nicknameInput').value.trim();
  if (!name) { alert('请输入昵称'); return; }
  myName = name;
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  document.getElementById('loginOverlay').style.display = 'none';
  addSystemMsg(name + ' 进入了聊天室');
  setTimeout(() => {
    addAiMsg('不象话', '👋 你好 ' + name + '！我是不象话，有什么我可以帮你的？也可以 @净瞎说 让我们一起讨论。支持发图片哦！');
  }, 600);
}

document.getElementById('nicknameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') enterChat();
});

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && !pendingImageBase64) return;
  if (isAiTyping) return;

  const imageBase64 = pendingImageBase64;
  const imageMime = pendingImageMime;

  input.value = '';
  input.style.height = 'auto';
  removeImage();

  addUserMsg(myName, text, imageBase64, imageMime);

  // 历史记录：有图片时用多模态格式，否则纯文字
  if (imageBase64) {
    chatHistory.push({
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: 'data:' + imageMime + ';base64,' + imageBase64 } },
        { type: 'text', text: myName + ': ' + (text || '请分析这张图片') }
      ]
    });
  } else {
    chatHistory.push({ role: 'user', content: myName + ': ' + text });
  }
  saveMemory();

  const mentionCat  = /@不象话/.test(text);
  const mentionClaw = /@净瞎说/.test(text);
  const mentionBoth = !mentionCat && !mentionClaw;

  isAiTyping = true;
  document.getElementById('sendBtn').disabled = true;

  if (mentionCat || mentionBoth)  await replyAs('不象话', CATDESK_SYSTEM,  text, imageBase64, imageMime);
  // 净瞎说在不象话回复之后才发请求，chatHistory 里已包含不象话的回复，形成真正的对话
  if (mentionClaw || mentionBoth) await replyAs('净瞎说', OPENCLAW_SYSTEM, text, null, null);

  isAiTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

const DEEPSEEK_API_KEY = 'sk-8f5ba8d190a148fea59e34e9aff010a7';
const KIMI_API_KEY = 'sk-sTEPX6wHlpBSiNj1qt8SSWaAbjAUSU9vB9b4syPoKYFN4TxZ';

async function replyAs(botName, systemPrompt, userText, imageBase64, imageMime) {
  const typingId = addTypingIndicator(botName);

  // 构建历史消息（过滤掉图片数据，只保留文字，避免 token 过多）
  const historyMessages = chatHistory.slice(-10).map(function(m) {
    if (typeof m.content === 'string') return { role: m.role, content: m.content };
    // 多模态消息只取文字部分用于历史
    const textPart = m.content.find(c => c.type === 'text');
    return { role: m.role, content: textPart ? textPart.text : '' };
  });

  // 最后一条用户消息：如果有图片则用多模态格式
  const lastUserMsg = historyMessages[historyMessages.length - 1];
  let finalMessages;

  if (imageBase64) {
    // 替换最后一条为多模态格式
    const withoutLast = historyMessages.slice(0, -1);
    const multimodalMsg = {
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: 'data:' + imageMime + ';base64,' + imageBase64 } },
        { type: 'text', text: myName + ': ' + (userText || '请分析这张图片') }
      ]
    };
    finalMessages = [{ role: 'system', content: systemPrompt }, ...withoutLast, multimodalMsg];
  } else {
    finalMessages = [{ role: 'system', content: systemPrompt }, ...historyMessages];
  }

  try {
    let res, data, reply;

    if (botName === '净瞎说') {
      res = await fetch('https://api.moonshot.cn/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KIMI_API_KEY },
        body: JSON.stringify({
          model: imageBase64 ? 'moonshot-v1-8k-vision-preview' : 'moonshot-v1-8k',
          messages: finalMessages,
          max_tokens: 300,
          temperature: 1.0
        }),
      });
    } else {
      res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({
          model: imageBase64 ? 'deepseek-vl2' : 'deepseek-chat',
          messages: finalMessages,
          max_tokens: 400,
          temperature: 0.7
        }),
      });
    }

    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg(botName, '⚠️ 错误 ' + res.status + '：' + errText.substring(0, 200));
      return;
    }
    data = await res.json();
    reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      ? data.choices[0].message.content.trim()
      : '（AI 暂时无法回复）';
    addAiMsg(botName, reply);
    chatHistory.push({ role: 'assistant', content: botName + ': ' + reply });
    saveMemory();
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg(botName, '⚠️ 连接出错：' + e.message);
  }
}

function addUserMsg(name, text, imageBase64, imageMime) {
  const el = document.createElement('div');
  el.className = 'msg self';
  const imgHtml = imageBase64
    ? '<img class="msg-img" src="data:' + imageMime + ';base64,' + imageBase64 + '" alt="图片" />'
    : '';
  const textHtml = text ? '<div class="msg-bubble bubble-user">' + escHtml(text) + '</div>' : '';
  el.innerHTML =
    '<div class="msg-avatar av-user">' + name[0].toUpperCase() + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + name + ' · ' + now() + '</div>' +
      imgHtml + textHtml +
    '</div>';
  appendMsg(el);
}

function addAiMsg(botName, text) {
  const isCat = botName === '不象话';
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML =
    '<div class="msg-avatar ' + (isCat ? 'av-cat' : 'av-claw') + '">' + (isCat ? '不' : '净') + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' · ' + now() + '</div>' +
      '<div class="msg-bubble ' + (isCat ? 'bubble-cat' : 'bubble-claw') + '">' + escHtml(text) + '</div>' +
    '</div>';
  appendMsg(el);
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = '<div class="msg-bubble bubble-system" style="margin:0 auto">' + escHtml(text) + '</div>';
  appendMsg(el);
}

function addTypingIndicator(botName) {
  const isCat = botName === '不象话';
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg';
  el.id = id;
  el.innerHTML =
    '<div class="msg-avatar ' + (isCat ? 'av-cat' : 'av-claw') + '">' + (isCat ? '不' : '净') + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' 正在输入...</div>' +
      '<div class="msg-bubble ' + (isCat ? 'bubble-cat' : 'bubble-claw') + '">' +
        '<div class="typing-indicator"><span></span><span></span><span></span></div>' +
      '</div>' +
    '</div>';
  appendMsg(el);
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendMsg(el) {
  const c = document.getElementById('messages');
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
