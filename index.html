<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天室 · CatDesk & OpenClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
    .online-badge {
      font-size: 12px; color: #6ee7b7;
      background: #064e3b33;
      border: 1px solid #065f4633;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .members {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .av-user   { background: #7c3aed; color: #fff; }
    .av-cat    { background: #0ea5e9; color: #fff; }
    .av-claw   { background: #f59e0b; color: #fff; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.self { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body { max-width: 70%; }
    .msg-meta {
      font-size: 11px; color: #6b7280;
      margin-bottom: 4px;
    }
    .msg.self .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble-user  { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-cat   { background: #1e3a5f; color: #e0f2fe; border-bottom-left-radius: 4px; border: 1px solid #0ea5e933; }
    .bubble-claw  { background: #3b2000; color: #fef3c7; border-bottom-left-radius: 4px; border: 1px solid #f59e0b33; }
    .bubble-system { background: #1f2937; color: #9ca3af; font-size: 12px; border-radius: 8px; text-align: center; align-self: center; }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%; background: #6b7280;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input ── */
    .input-area {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 14px 20px;
    }
    .hint {
      font-size: 11px; color: #4b5563;
      margin-bottom: 8px;
    }
    .hint span { color: #7c3aed; }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    #msgInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: #7c3aed; }
    #msgInput::placeholder { color: #4b5563; }

    #sendBtn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #sendBtn:hover { background: #6d28d9; }
    #sendBtn:disabled { background: #374151; cursor: not-allowed; }

    /* ── Login overlay ── */
    #loginOverlay {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      text-align: center;
    }
    .login-box h2 { font-size: 22px; color: #a78bfa; margin-bottom: 8px; }
    .login-box p  { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box input::placeholder { color: #4b5563; }
    .login-box button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .login-box button:hover { background: #6d28d9; }
    .robots { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .robot-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .robot-card .r-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      margin: 0 auto 6px;
    }
    .key-label {
      font-size: 11px; color: #6b7280;
      text-align: left;
      margin-bottom: 4px;
      margin-top: 4px;
    }
    .key-label a { color: #7c3aed; text-decoration: none; }
    .key-label a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>🤖 AI 聊天室</h2>
    <p>和 CatDesk & OpenClaw 一起聊天</p>
    <div class="robots">
      <div class="robot-card">
        <div class="r-avatar" style="background:#1e3a5f;color:#0ea5e9">C</div>
        CatDesk
      </div>
      <div class="robot-card">
        <div class="r-avatar" style="background:#3b2000;color:#f59e0b">O</div>
        OpenClaw
      </div>
    </div>
    <input id="nicknameInput" type="text" placeholder="输入你的昵称" maxlength="20" />
    <div class="key-label">DeepSeek API Key（CatDesk 使用）<a href="https://platform.deepseek.com/api_keys" target="_blank">获取 →</a></div>
    <input id="dsKeyInput" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" />
    <button onclick="enterChat()">进入聊天室</button>
  </div>
</div>

<!-- Chat UI -->
<header>
  <h1>🤖 AI 聊天室</h1>
  <span class="online-badge" id="onlineBadge">● 在线</span>
  <div class="members">
    <div class="avatar av-cat" title="CatDesk">C</div>
    <div class="avatar av-claw" title="OpenClaw">O</div>
    <div class="avatar av-user" id="userAvatar" title="你">?</div>
  </div>
</header>

<div id="messages"></div>

<div class="input-area">
  <div class="hint">输入 <span>@CatDesk</span> 或 <span>@OpenClaw</span> 呼叫指定 AI，或直接发消息让两个 AI 都回复</div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="说点什么..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
// ── 配置 ──────────────────────────────────────────
// OpenClaw 飞书云端地址（净虾说）
const OPENCLAW_BASE = 'https://wmkoqvc4bq-app_4juv8k69pmm6b-1861268274721987.aiforce.run';
const OPENCLAW_TOKEN = 'chatroom-openclaw-2026';

// DeepSeek API
const DEEPSEEK_BASE = 'https://api.deepseek.com';
const DEEPSEEK_MODEL = 'deepseek-chat';

const CATDESK_SYSTEM = `你是 CatDesk，美团质量与效率团队打造的 AI 助手。你聪明、专业、有条理，擅长解决技术问题和工作任务。
你在一个三人聊天室里，另一个 AI 是 OpenClaw，用户也在。
回复要简洁有力，不超过200字。遇到技术问题给出具体方案。`;

const OPENCLAW_SYSTEM = `你是 OpenClaw，一个开放、创意、思维发散的 AI 助手。你喜欢从不同角度思考问题，有时会提出意想不到的解决方案。
你在一个三人聊天室里，另一个 AI 是 CatDesk，用户也在。
回复要有个性，偶尔幽默，不超过200字。`;

// ── 状态 ──────────────────────────────────────────
let myName = '';
let dsApiKey = '';
let chatHistory = [];
let isAiTyping = false;

// ── 进入聊天室 ────────────────────────────────────
function enterChat() {
  if (myName) return;
  const name = document.getElementById('nicknameInput').value.trim();
  if (!name) { alert('请输入昵称'); return; }
  const key = document.getElementById('dsKeyInput').value.trim();
  if (!key) { alert('请输入 DeepSeek API Key（CatDesk 需要它来回复）'); return; }

  myName = name;
  dsApiKey = key;
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  document.getElementById('loginOverlay').style.display = 'none';
  addSystemMsg(`${name} 进入了聊天室`);
  setTimeout(() => {
    addAiMsg('CatDesk', `👋 你好 ${name}！我是 CatDesk，有什么我可以帮你的？也可以 @OpenClaw 让我们一起讨论。`);
  }, 600);
}

document.getElementById('nicknameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('dsKeyInput').focus();
});
document.getElementById('dsKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterChat();
});

// ── 发送消息 ──────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isAiTyping) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMsg(myName, text);
  chatHistory.push({ role: 'user', content: `${myName}: ${text}` });

  const mentionCat  = /\@CatDesk/i.test(text);
  const mentionClaw = /\@OpenClaw/i.test(text);
  const mentionBoth = !mentionCat && !mentionClaw;

  isAiTyping = true;
  document.getElementById('sendBtn').disabled = true;

  if (mentionCat || mentionBoth) {
    await replyAsCatDesk(text);
  }
  if (mentionClaw || mentionBoth) {
    await replyAsOpenClaw(text);
  }

  isAiTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── CatDesk 回复（直调 DeepSeek） ─────────────────
async function replyAsCatDesk(userText) {
  const typingId = addTypingIndicator('CatDesk');
  const recent = chatHistory.slice(-10);
  const messages = [
    { role: 'system', content: CATDESK_SYSTEM },
    ...recent.map(m => ({ role: m.role, content: m.content })),
  ];

  try {
    const res = await fetch(`${DEEPSEEK_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${dsApiKey}`,
      },
      body: JSON.stringify({
        model: DEEPSEEK_MODEL,
        messages,
        max_tokens: 400,
        temperature: 0.7,
      }),
    });
    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg('CatDesk', `⚠️ DeepSeek 错误 ${res.status}：${errText.substring(0, 200)}`);
      return;
    }
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || '（CatDesk 暂时无法回复）';
    addAiMsg('CatDesk', reply);
    chatHistory.push({ role: 'assistant', content: `CatDesk: ${reply}` });
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg('CatDesk', `⚠️ 连接出错：${e.message}`);
  }
}

// ── OpenClaw 回复（直调飞书云端净虾说） ───────────
async function replyAsOpenClaw(userText) {
  const typingId = addTypingIndicator('OpenClaw');
  const recent = chatHistory.slice(-10);
  const messages = [
    { role: 'system', content: OPENCLAW_SYSTEM },
    ...recent.map(m => ({ role: m.role, content: m.content })),
  ];

  try {
    const res = await fetch(`${OPENCLAW_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENCLAW_TOKEN}`,
      },
      body: JSON.stringify({
        model: 'openclaw',
        messages,
        max_tokens: 400,
        temperature: 0.8,
      }),
    });
    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg('OpenClaw', `⚠️ OpenClaw 错误 ${res.status}：${errText.substring(0, 200)}`);
      return;
    }
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || '（OpenClaw 暂时无法回复）';
    addAiMsg('OpenClaw', reply);
    chatHistory.push({ role: 'assistant', content: `OpenClaw: ${reply}` });
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg('OpenClaw', `⚠️ 连接出错：${e.message}`);
  }
}

// ── DOM 操作 ──────────────────────────────────────
function addUserMsg(name, text) {
  const el = document.createElement('div');
  el.className = 'msg self';
  el.innerHTML = `
    <div class="msg-avatar av-user">${name[0].toUpperCase()}</div>
    <div class="msg-body">
      <div class="msg-meta">${name} · ${now()}</div>
      <div class="msg-bubble bubble-user">${escHtml(text)}</div>
    </div>`;
  appendMsg(el);
}

function addAiMsg(botName, text) {
  const isCat = botName === 'CatDesk';
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="msg-avatar ${isCat ? 'av-cat' : 'av-claw'}">${botName[0]}</div>
    <div class="msg-body">
      <div class="msg-meta">${botName} · ${now()}</div>
      <div class="msg-bubble ${isCat ? 'bubble-cat' : 'bubble-claw'}">${escHtml(text)}</div>
    </div>`;
  appendMsg(el);
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `<div class="msg-bubble bubble-system" style="margin:0 auto">${escHtml(text)}</div>`;
  appendMsg(el);
}

function addTypingIndicator(botName) {
  const isCat = botName === 'CatDesk';
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg';
  el.id = id;
  el.innerHTML = `
    <div class="msg-avatar ${isCat ? 'av-cat' : 'av-claw'}">${botName[0]}</div>
    <div class="msg-body">
      <div class="msg-meta">${botName} 正在输入...</div>
      <div class="msg-bubble ${isCat ? 'bubble-cat' : 'bubble-claw'}">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  appendMsg(el);
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendMsg(el) {
  const container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 快捷键 ────────────────────────────────────────
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
