<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天室 · 不象话 &amp; 净虾说</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
    .online-badge {
      font-size: 12px; color: #6ee7b7;
      background: #064e3b33;
      border: 1px solid #065f4633;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .members {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .av-user   { background: #7c3aed; color: #fff; }
    .av-cat    { background: #0ea5e9; color: #fff; }
    .av-claw   { background: #f59e0b; color: #fff; }
    .av-claude { background: #c2410c; color: #fff; }
    .av-custom { background: #10b981; color: #fff; }


    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.self { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body { max-width: 70%; }
    .msg-meta { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .msg.self .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble-user   { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-cat    { background: #1e3a5f; color: #e0f2fe; border-bottom-left-radius: 4px; border: 1px solid #0ea5e933; }
    .bubble-claw   { background: #3b2000; color: #fef3c7; border-bottom-left-radius: 4px; border: 1px solid #f59e0b33; }
    .bubble-claude { background: #431407; color: #fed7aa; border-bottom-left-radius: 4px; border: 1px solid #c2410c33; }
    .bubble-custom { background: #064e3b; color: #d1fae5; border-bottom-left-radius: 4px; border: 1px solid #10b98133; }
    .bubble-system { background: #1f2937; color: #9ca3af; font-size: 12px; border-radius: 8px; text-align: center; }
    .bubble-memory { background: #1a1a2e; color: #6b7280; font-size: 11px; border-radius: 8px; text-align: center; border: 1px dashed #2a2a4a; padding: 6px 12px; }

    .catdesk-visit-banner { display: flex; align-items: flex-start; gap: 10px; background: linear-gradient(90deg, #1c1033 0%, #0f0f1a 100%); border: 1px solid #7c3aed55; border-radius: 12px; padding: 10px 16px; margin: 0 auto; max-width: 90%; font-size: 12px; color: #a78bfa; }
    .catdesk-visit-banner .cd-icon { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #c2410c); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; box-shadow: 0 0 8px #7c3aed66; }
    .catdesk-visit-banner .cd-body { flex: 1; }
    .catdesk-visit-banner .cd-label { font-size: 11px; color: #7c3aed; font-weight: 600; letter-spacing: 0.5px; }
    .catdesk-visit-banner .cd-question { color: #e0e0e0; font-size: 13px; margin-top: 3px; line-height: 1.5; }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%; background: #6b7280;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 14px 20px;
    }
    .hint { font-size: 11px; color: #4b5563; margin-bottom: 8px; }
    .hint span { color: #7c3aed; }
    .hint .hint-custom { color: #10b981; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #msgInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: #7c3aed; }
    #msgInput::placeholder { color: #4b5563; }

    #sendBtn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #sendBtn:hover { background: #6d28d9; }
    #sendBtn:disabled { background: #374151; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: #4b5563;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #clearBtn:hover { color: #ef4444; border-color: #ef4444; }

    #discussBtn {
      background: transparent;
      color: #4b5563;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #discussBtn:hover { color: #a78bfa; border-color: #7c3aed; }
    #discussBtn.active {
      color: #a78bfa;
      border-color: #7c3aed;
      background: #7c3aed22;
    }
    #discussBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .discuss-badge {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-size: 10px;
      border-radius: 20px;
      padding: 1px 6px;
      margin: 0 auto 6px;
      text-align: center;
      width: fit-content;
    }

    #imgBtn {
      background: transparent;
      color: #6b7280;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      line-height: 1;
    }
    #imgBtn:hover { color: #a78bfa; border-color: #7c3aed; }

    #imgPreview {
      display: none;
      padding: 8px 0 4px;
      position: relative;
      width: fit-content;
    }
    #imgPreview img {
      max-height: 80px;
      max-width: 200px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
    }
    #imgPreview .remove-img {
      position: absolute;
      top: 4px;
      right: -8px;
      background: #374151;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .msg-img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      margin-top: 6px;
      display: block;
      border: 1px solid #2a2a4a;
    }

    /* ===== 登录页 ===== */
    #loginOverlay {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 36px 40px;
      width: 420px;
      max-width: 100%;
    }
    .login-box h2 { font-size: 22px; color: #a78bfa; margin-bottom: 6px; text-align: center; }
    .login-box .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; text-align: center; }

    .login-section {
      margin-bottom: 20px;
    }
    .login-section-title {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;

    .login-section-title::after {
      content: '';

      height: 1px;
      background: #2a2a4a;
    }

    .login-box input, .login-box textarea {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .login-box input:focus, .login-box textarea:focus { border-color: #7c3aed; }
    .login-box textarea { resize: none; min-height: 70px; font-size: 13px; }

    .login-box button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .login-box button:hover { background: #6d28d9; }

    .robots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .robot-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      flex: 1;
    }
    .robot-card .r-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      margin: 0 auto 6px;
    }
    .robot-card .r-name { font-weight: 600; color: #d1d5db; margin-bottom: 2px; }
    .robot-card .r-desc { font-size: 11px; color: #4b5563; }

    .custom-ai-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #9ca3af;
      cursor: pointer;
      margin-bottom: 12px;
      user-select: none;
    }
    .custom-ai-toggle input[type=checkbox] { accent-color: #10b981; width: 15px; height: 15px; cursor: pointer; }
    .custom-ai-fields { display: none; }
    .custom-ai-fields.show { display: block; }

    .memory-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #10b981;
      background: #064e3b33;
      border: 1px solid #10b98133;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 8px;
    }

    .input-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2>🤖 AI 聊天室</h2>
    <p class="subtitle">带上你的小龙虾，一起来聊天</p>

    <div class="robots">

</div>

<header>
  <h1>🤖 AI 聊天室</h1>
  <span class="online-badge">● 在线</span>
  <div class="members">
    <div class="avatar av-cat" title="不象话">不</div>
    <div class="avatar av-claw" title="净虾说">净</div>
    <div class="avatar av-claude" id="claudeAvatarHeader" title="catdesk（Claude）" style="display:none">C</div>

<div id="messages"></div>

<div class="input-area">
  <div class="hint" id="hintText">输入 <span>@不象话</span>、<span>@净虾说</span> 或 <span style="color:#fb923c">@catdesk</span> 呼叫指定 AI，或直接发消息让所有 AI 回复</div>
  <div id="imgPreview">

<script>
// ===== 固定 AI 的 system prompt =====
const CATDESK_SYSTEM = `你是不象话，一个说话直接、不按套路出牌的 AI。你聪明专业，但从不废话，说出来的话让人觉得"这也太不象话了"——但偏偏有道理。

你在一个多人聊天室里：用户负责抛出问题和最终拍板，你和其他 AI 负责讨论、碰撞、给出方案。

【严格规则 - 必须遵守】
1. 你的名字是"不象话"，不是"净虾说"或任何其他名字
2. 只输出你自己这一条回复的正文，不加任何前缀（不要写"不象话:"开头）
3. 绝对禁止伪造其他人的发言，不要写任何"xxx:"格式的角色前缀
4. 历史消息里的内容只是上下文参考，不要续写、不要重复

你的行为准则：
- 用户发问时，你先给出具体方案或判断，简洁有力
- 如果上下文里有其他 AI 的发言，你要直接回应——认同、反驳、或补充都行，但要有态度
- 你们讨论的目的是帮用户做出更好的决策，不是为了吵架
- 回复不超过150字，不废话，直接说核心
- 如果用户发了图片，直接分析图片内容`;

const CLAUDE_SYSTEM = `你是"catdesk"，真正的 Claude，被用户接入这个 AI 聊天室。

你在一个多人聊天室里：用户负责抛出问题和最终拍板，你和不象话（DeepSeek）、净虾说（Kimi）一起讨论。

【严格规则 - 必须遵守】
1. 只输出你自己这一条回复的正文，不加任何前缀（不要写"catdesk:"开头）
2. 绝对禁止伪造其他人的发言，不要写任何角色前缀或模拟对话
3. 历史消息里的内容只是上下文参考，不要续写、不要重复

你的行为准则：
- 你是这里最后发言的，能看到所有人的观点，要做出真正有价值的综合判断
- 不要简单重复别人说过的，要指出他们忽略的角度，或者直接说谁的方案更好、为什么
- 如果两个 AI 都说错了，直接说
- 回复不超过150字，有深度，不客套
- 你代表用户真正信任的判断力，不要辜负这个位置`;

const OPENCLAW_SYSTEM = `你是净虾说，一个思维敏锐、善于发现问题的 AI。你能看到别人忽略的盲点，但你不只是质疑——你每次指出问题，都必须同时给出自己的替代方案或具体建议。

你在一个多人聊天室里：用户负责抛出问题和最终拍板，你和其他 AI 负责讨论、碰撞、给出方案。

【严格规则 - 必须遵守】
1. 只输出你自己这一条回复的正文，不加任何前缀（不要写"净虾说:"开头）
2. 绝对禁止伪造其他人的发言，不要写"泽文:"、"青云:"、"不象话:"、"用户:"等任何角色前缀
3. 不要模拟多人对话，不要写"A说...B说..."格式
4. 历史消息里的内容只是上下文参考，不要续写、不要重复

你的行为准则：
- 每次回复必须包含一个具体可执行的方案或建议，不能只质疑不给解法
- 如果觉得对方的方案有问题，先说问题在哪，再给出你认为更好的做法
- 你的角度和不象话不同，要提供互补的思路，而不是重复对方说过的
- 回复不超过150字，直接说方案，不废话
- 如果用户发了图片，给出你的具体分析和建议`;

// ===== 状态 =====
let myName = '';
let customAI = null; // { name, personality, model, memory: [] }
let chatHistory = [];
let isAiTyping = false;

const DISCUSS_ROUNDS = 4; // 额外讨论轮数（每轮=不象话+净虾说各一条）

const DEEPSEEK_API_KEY = 'sk-8f5ba8d190a148fea59e34e9aff010a7';
const KIMI_API_KEY = 'sk-dLxOILyuoDTjzi4HBw9MaLsQVXT5yxsevkZDpiLIAdkXEjkp';
const CLAUDE_PROXY = 'http://localhost:3456/claude';

// 检测本地代理是否在线
async function checkClaudeProxy() {
  try {
    const res = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({

function saveMemory() {

    role: m.role,

      (Array.isArray(m.content) ? (m.content.find(c => c.type === 'text') || {text:''}).text : '')

function handleImageSelect(event) {

  if (!file) return;

  reader.onload = function(e) {
    const dataUrl = e.target.result;
    pendingImageMime = file.type || 'image/jpeg';
    pendingImageBase64 = dataUrl.split(',')[1];
    document.getElementById('imgPreviewImg').src = dataUrl;
    document.getElementById('imgPreview').style.display = 'block';
  };

}

// ===== 发送消息 =====
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && !pendingImageBase64) return;
  if (isAiTyping) return;

  const imageBase64 = pendingImageBase64;
  const imageMime = pendingImageMime;

  input.value = '';
  input.style.height = 'auto';
  removeImage();

  addUserMsg(myName, text, imageBase64, imageMime);

  if (imageBase64) {
    chatHistory.push({
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: 'data:' + imageMime + ';base64,' + imageBase64 } },
        { type: 'text', text: myName + ': ' + (text || '请分析这张图片') }
      ]
    });
  } else {
    chatHistory.push({ role: 'user', content: myName + ': ' + text });
  }
  saveMemory();

  const mentionCat    = /@不象话/.test(text);
  const mentionClaw   = /@净虾说/.test(text);
  const mentionCustom = customAI && new RegExp('@' + customAI.name).test(text);
  const mentionNone   = !mentionCat && !mentionClaw && !mentionCustom;

  isAiTyping = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('discussBtn').disabled = true;

  const mentionClaude = /@catdesk/.test(text) || /@Claude/.test(text) || /@claude/.test(text);
  const mentionAny = mentionCat || mentionClaw || mentionCustom || mentionClaude;
  const mentionNoneUpdated = !mentionAny;

  // 不象话先回
  if (mentionCat || mentionNoneUpdated) {
    await replyAs('不象话', CATDESK_SYSTEM, text, imageBase64, imageMime, 'deepseek');
  }
  // 净虾说读到不象话的回复后再回
  if (mentionClaw || mentionNoneUpdated) {
    await replyAs('净虾说', OPENCLAW_SYSTEM, text, null, null, 'kimi');
  }
  // catdesk 最后回，能读到所有人的发言
  if ((mentionClaude || mentionNoneUpdated) && claudeOnline) {
    await replyAsClaude(text, imageBase64, imageMime);
  }
  // 专属 AI
  if (mentionCustom || mentionNoneUpdated) {
    if (customAI) await replyAsCustom(text, imageBase64, imageMime);
  }

  // 每轮对话结束后，让专属 AI 生成记忆摘要
  if (customAI && (mentionCustom || mentionNone)) {
    await generateCustomAIMemory();
  }

  // 讨论模式：额外来回几轮
  if (discussMode && mentionNoneUpdated) {
    await runDiscussion(DISCUSS_ROUNDS);
  }

  isAiTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('discussBtn').disabled = false;
}

// 讨论模式专用回复：把完整对话历史整理成一条 user 消息，让 AI 清楚看到讨论脉络
async function replyAsDiscuss(botName, systemPrompt, modelProvider) {
  const typingId = addTypingIndicator(botName);

  // 把 chatHistory 里的所有消息整理成可读的对话记录
  const transcript = chatHistory.slice(-24).map(m => {
    if (typeof m.content === 'string') return m.content;
    const t = m.content.find && m.content.find(c => c.type === 'text');
    return t ? t.text : '';
  }).filter(Boolean).join('\n');

  // 上一条发言者（用于 @前缀）
  const lastMsg = chatHistory[chatHistory.length - 1];
  const prevSpeaker = (lastMsg && lastMsg.role === 'assistant')
    ? lastMsg.content.split(':')[0].trim() : null;

  const atPrefix = prevSpeaker
    ? `\n\n【本条回复格式要求】上一条发言来自"${prevSpeaker}"，请在回复最开头加"@${prevSpeaker} "，然后直接写内容，不要换行。`
    : '';

  const discussSuffix = '\n\n【当前状态】你正在多轮深入讨论中，要推进方案、提出新角度或具体建议，不要重复已说过的内容。';

  const finalSystem = systemPrompt + discussSuffix + atPrefix;

  // 用单条 user 消息传入完整对话记录，避免 role 交替问题
  const finalMessages = [
    { role: 'system', content: finalSystem },
    { role: 'user', content: '【完整对话记录】\n' + transcript + '\n\n请继续讨论，给出你的下一步观点。' }
  ];

  try {
    let res, data, reply;
    if (modelProvider === 'kimi') {
      res = await fetch('https://api.moonshot.cn/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KIMI_API_KEY },
        body: JSON.stringify({ model: 'moonshot-v1-8k', messages: finalMessages, max_tokens: 300, temperature: 1.0 }),
      });
    } else {
      res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({ model: 'deepseek-chat', messages: finalMessages, max_tokens: 400, temperature: 0.8 }),
      });
    }
    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg(botName, '⚠️ 错误 ' + res.status + '：' + errText.substring(0, 200));
      return;
    }
    data = await res.json();
    reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      ? data.choices[0].message.content.trim()
      : '（AI 暂时无法回复）';
    addAiMsg(botName, reply);
    chatHistory.push({ role: 'assistant', content: botName + ': ' + reply });
    saveMemory();
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg(botName, '⚠️ 连接出错：' + e.message);
  }
}

// 把 chatHistory 转成 API messages
// assistant 消息存的是 "说话者: 内容" 格式，传给 API 时转成 user role
// 这样 AI 不会把其他 AI 的发言误认为是自己说的，避免续写伪造对话
function buildMessages(limit) {
  const msgs = [];
  const slice = chatHistory.slice(-limit);
  for (let i = 0; i < slice.length; i++) {
    const m = slice[i];
    let content;
    if (typeof m.content === 'string') {
      content = m.content;
    } else if (m.content && m.content.find) {
      content = (m.content.find(c => c.type === 'text') || {text:''}).text || '...';
    } else {
      content = '...';
    }
    if (m.role === 'assistant') {
      // 其他 AI 的发言：作为 user 消息传入，让当前 AI 知道这是别人说的
      msgs.push({ role: 'user', content: content });
    } else {
      msgs.push({ role: m.role, content: content || '...' });
    }
  }
  // 确保首条是 user
  while (msgs.length > 0 && msgs[0].role !== 'user') msgs.shift();
  // 合并相邻同 role 消息（避免连续 user/user 报错）
  const merged = [];
  for (const msg of msgs) {
    if (merged.length > 0 && merged[merged.length - 1].role === msg.role) {
      merged[merged.length - 1].content += '\n' + msg.content;
    } else {
      merged.push({ role: msg.role, content: msg.content });
    }
  }
  return merged;
}

// ===== 固定 AI 回复 =====
async function replyAs(botName, systemPrompt, userText, imageBase64, imageMime, modelProvider) {
  const typingId = addTypingIndicator(botName);

  // 判断是否有其他 AI 已经发言（chatHistory 最后一条是 assistant）
  // 如果是，要求在回复开头加 @对方名字，表示在回应对方
  const lastMsg = chatHistory[chatHistory.length - 1];
  const prevAiSpeaker = (lastMsg && lastMsg.role === 'assistant')
    ? lastMsg.content.split(':')[0].trim()
    : null;
  const effectiveSystem = prevAiSpeaker
    ? systemPrompt + `\n\n【本条回复格式要求】上一条发言来自"${prevAiSpeaker}"，你是在回应 TA，请在回复正文最开头加上"@${prevAiSpeaker} "（注意后面有一个空格），然后直接写你的内容，不要换行。`
    : systemPrompt;

  // 讨论模式下保留更多历史，让 AI 能看到完整讨论脉络
  const historyMessages = buildMessages(discussMode ? 24 : 12);

  let finalMessages;
  if (imageBase64) {
    const withoutLast = historyMessages.slice(0, -1);
    const multimodalMsg = {
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: 'data:' + imageMime + ';base64,' + imageBase64 } },
        { type: 'text', text: myName + ': ' + (userText || '请分析这张图片') }
      ]
    };
    finalMessages = [{ role: 'system', content: effectiveSystem }, ...withoutLast, multimodalMsg];
  } else {
    finalMessages = [{ role: 'system', content: effectiveSystem }, ...historyMessages];
  }

  try {
    let res, data, reply;
    if (modelProvider === 'kimi') {
      res = await fetch('https://api.moonshot.cn/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KIMI_API_KEY },
        body: JSON.stringify({
          model: imageBase64 ? 'moonshot-v1-8k-vision-preview' : 'moonshot-v1-8k',
          messages: finalMessages,
          max_tokens: 300,
          temperature: 1.0
        }),
      });
    } else {
      res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({
          model: imageBase64 ? 'deepseek-vl2' : 'deepseek-chat',
          messages: finalMessages,
          max_tokens: 400,
          temperature: 0.7
        }),
      });
    }

    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg(botName, '⚠️ 错误 ' + res.status + '：' + errText.substring(0, 200));
      return;
    }
    data = await res.json();
    reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      ? data.choices[0].message.content.trim()
      : '（AI 暂时无法回复）';
    addAiMsg(botName, reply);
    // 存储时带说话者标签，buildMessages 会将其转为 user role 传给下一个 AI
    chatHistory.push({ role: 'assistant', content: botName + ': ' + reply });
    saveMemory();
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg(botName, '⚠️ 连接出错：' + e.message);
  }
}

// ===== catdesk 回复 =====
async function replyAsClaude(userText, imageBase64, imageMime) {
  const typingId = addTypingIndicator('catdesk');

  // 判断是否有其他 AI 已经发言，决定是否加 @前缀
  const lastMsg = chatHistory[chatHistory.length - 1];
  const prevAiSpeaker = (lastMsg && lastMsg.role === 'assistant')
    ? lastMsg.content.split(':')[0].trim()
    : null;
  const effectiveClaudeSystem = prevAiSpeaker
    ? CLAUDE_SYSTEM + `\n\n【本条回复格式要求】上一条发言来自"${prevAiSpeaker}"，你是在回应 TA，请在回复正文最开头加上"@${prevAiSpeaker} "（注意后面有一个空格），然后直接写你的内容，不要换行。`
    : CLAUDE_SYSTEM;

  const historyMessages = buildMessages(12);

  // Claude API 格式：system 单独传，messages 里不含 system
  const messages = historyMessages.map(m => ({
    role: m.role === 'assistant' ? 'assistant' : 'user',
    content: m.content
  }));

  // 确保首条是 user
  while (messages.length > 0 && messages[0].role !== 'user') messages.shift();

  const payload = {
    model: 'claude-3-5-sonnet-20241022',
    max_tokens: 400,
    system: effectiveClaudeSystem,
    messages: messages.length > 0 ? messages : [{ role: 'user', content: myName + ': ' + (userText || '你好') }]
  };

  try {
    const res = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    removeTypingIndicator(typingId);
    if (!res.ok) {
      const errText = await res.text();
      addAiMsg('catdesk', '⚠️ 错误 ' + res.status + '：' + errText.substring(0, 200), 'claude');
      return;
    }
    const data = await res.json();
    const reply = data.content && data.content[0] && data.content[0].text
      ? data.content[0].text.trim()
      : '（暂时无法回复）';
    addAiMsg('catdesk', reply, 'claude');
    chatHistory.push({ role: 'assistant', content: 'catdesk: ' + reply });
    saveMemory();
  } catch (e) {
    removeTypingIndicator(typingId);
    addAiMsg('catdesk', '⚠️ 连接出错：' + e.message, 'claude');
  }
}

    addAiMsg(ai.name, '⚠️ 连接出错：' + e.message, true);
  }
}

// ===== 专属 AI 生成记忆摘要 =====
async function generateCustomAIMemory() {
  if (!customAI || chatHistory.length < 4) return;

  // 取最近几轮对话生成摘要，静默进行不显示 typing
  const recentHistory = chatHistory.slice(-8).map(m => {
    if (typeof m.content === 'string') return m.content;
    const textPart = m.content.find(c => c.type === 'text');
    return textPart ? textPart.text : '';
  }).join('\n');

  const memoryPrompt = [{
    role: 'system',
    content: '你是一个记忆提取助手。根据对话内容，用一句话（不超过50字）总结用户最重要的信息、偏好或需求。只输出这一句话，不要任何前缀。'
  }, {
    role: 'user',
    content: '对话内容：\n' + recentHistory + '\n\n请提取一条关于用户的关键记忆：'
  }];

  try {
    const provider = customAI.model;
    let res;
    if (provider === 'kimi') {
      res = await fetch('https://api.moonshot.cn/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KIMI_API_KEY },
        body: JSON.stringify({ model: 'moonshot-v1-8k', messages: memoryPrompt, max_tokens: 80, temperature: 0.3 }),
      });
    } else {
      res = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({ model: 'deepseek-chat', messages: memoryPrompt, max_tokens: 80, temperature: 0.3 }),
      });
    }
    if (!res.ok) return;
    const data = await res.json();
    const summary = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content
      ? data.choices[0].message.content.trim()
      : null;
    if (summary) {
      saveCustomAIMemory(summary);
      addMemoryMsg('🧠 ' + customAI.name + ' 记住了：' + summary);
    }
  } catch (e) {
    // 记忆生成失败静默处理
  }
}

// ===== UI 渲染 =====
function addUserMsg(name, text, imageBase64, imageMime) {
  const el = document.createElement('div');
  el.className = 'msg self';
  const imgHtml = imageBase64
    ? '<img class="msg-img" src="data:' + imageMime + ';base64,' + imageBase64 + '" alt="图片" />'
    : '';
  const textHtml = text ? '<div class="msg-bubble bubble-user">' + escHtml(text) + '</div>' : '';
  el.innerHTML =
    '<div class="msg-avatar av-user">' + name[0].toUpperCase() + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + name + ' · ' + now() + '</div>' +
      imgHtml + textHtml +
    '</div>';
  appendMsg(el);
}

function addAiMsg(botName, text, type) {
  const isCat = botName === '不象话';
  const isClaw = botName === '净虾说';
  const isClaude = type === 'claude' || botName === 'catdesk';
  let avatarClass, bubbleClass, initial;
  if (isCat) {
    avatarClass = 'av-cat'; bubbleClass = 'bubble-cat'; initial = '不';
  } else if (isClaw) {
    avatarClass = 'av-claw'; bubbleClass = 'bubble-claw'; initial = '净';
  } else if (isClaude) {
    avatarClass = 'av-claude'; bubbleClass = 'bubble-claude'; initial = 'C';
  } else {
    avatarClass = 'av-custom'; bubbleClass = 'bubble-custom'; initial = botName[0];
  }
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML =
    '<div class="msg-avatar ' + avatarClass + '">' + initial + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' · ' + now() + '</div>' +
      '<div class="msg-bubble ' + bubbleClass + '">' + escHtml(text) + '</div>' +
    '</div>';
  appendMsg(el);
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = '<div class="msg-bubble bubble-system" style="margin:0 auto">' + escHtml(text) + '</div>';
  appendMsg(el);
}

function addMemoryMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = '<div class="msg-bubble bubble-memory" style="margin:0 auto">' + escHtml(text) + '</div>';
  appendMsg(el);
}

function addTypingIndicator(botName) {
  const isCat = botName === '不象话';
  const isClaw = botName === '净虾说';
  const isClaude = botName === 'catdesk';
  let avatarClass, bubbleClass, initial;
  if (isCat) {
    avatarClass = 'av-cat'; bubbleClass = 'bubble-cat'; initial = '不';
  } else if (isClaw) {
    avatarClass = 'av-claw'; bubbleClass = 'bubble-claw'; initial = '净';
  } else if (isClaude) {
    avatarClass = 'av-claude'; bubbleClass = 'bubble-claude'; initial = 'C';
  } else {
    avatarClass = 'av-custom'; bubbleClass = 'bubble-custom'; initial = botName[0];
  }
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg';
  el.id = id;
  el.innerHTML =
    '<div class="msg-avatar ' + avatarClass + '">' + initial + '</div>' +
    '<div class="msg-body">' +
      '<div class="msg-meta">' + botName + ' 正在输入...</div>' +
      '<div class="msg-bubble ' + bubbleClass + '">' +
        '<div class="typing-indicator"><span></span><span></span><span></span></div>' +
      '</div>' +
    '</div>';
  appendMsg(el);
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendMsg(el) {
  const c = document.getElementById('messages');
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ===== CatDesk 来访 =====
function addCatDeskVisit(question) {
  var el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML =
    '<div class="catdesk-visit-banner">' +
      '<div class="cd-icon">C</div>' +
      '<div class="cd-body">' +
        '<div class="cd-label">&#9889; CatDesk 来访 &middot; ' + now() + '</div>' +
        '<div class="cd-question">' + escHtml(question) + '</div>' +
      '</div>' +
    '</div>';
  appendMsg(el);
}

window.catdeskConsult = async function(question, rounds) {
  rounds = rounds || 2;
  addCatDeskVisit(question);
  chatHistory.push({ role: 'user', content: 'CatDesk: ' + question });
  isAiTyping = true;
  await replyAs('不象话', CATDESK_SYSTEM, question, null, null, 'deepseek');
  await replyAs('净虾说', OPENCLAW_SYSTEM, question, null, null, 'kimi');
  if (rounds > 0) { await runDiscussion(rounds); }
  isAiTyping = false;
  var log = chatHistory.slice(-((rounds * 2) + 3))
    .map(function(m) { return typeof m.content === 'string' ? m.content : ''; })
    .filter(Boolean).join('\n');
  addSystemMsg('✅ CatDesk 已收到讨论结果');
  return log;
};

document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
